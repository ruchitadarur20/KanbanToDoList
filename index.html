<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="header">
        <h1>Kanban To-Do List</h1>
        <img src="https://example.com/kanban-logo.jpg" alt="Kanban Logo" class="logo">
    </div>
        
    <div class="board">
        <div class="column" id="todo">
            <h2>To-Do</h2>
            <form class="add-task-form" id="todo-form">
                <input type="text" placeholder="Add a new task" id="todo-input">
                <input type="date" id="todo-date">
                <select id="todo-priority">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                </select>
                <button type="button" onclick="addTask('todo')">+</button>
            </form>
            <div class="task-list"></div>
        </div>
        <div class="column" id="in-progress">
            <h2>In Progress</h2>
            <div class="task-list"></div>
        </div>
        <div class="column" id="done">
            <h2> Done</h2>
            <div class="task-list"></div>
        </div>
    </div>
<script src="script.js" defer></script>    
</body>
</html>
